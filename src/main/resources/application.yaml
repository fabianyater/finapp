spring:
  application:
    name: finapp
  profiles:
    active: local

api:
  base-path: /api/v1

jwt:
  secret: ${JWT_SECRET}
  expirationInSeconds: 3600
  refreshExpirationInSeconds: 2592000
  issuer: finapp

anthropic:
  api-key: ${ANTHROPIC_API_KEY}
  model: claude-haiku-4-5-20251001
  max-tokens: 1024
