server:
  port: ${PORT:8081}

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.micrometer.metrics.autoconfigure.system.SystemMetricsAutoConfiguration
      - org.springframework.boot.tomcat.autoconfigure.metrics.TomcatMetricsAutoConfiguration
  main:
    lazy-initialization: true
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}?sslmode=require
    username: ${PGUSER}
    password: ${PGPASSWORD}
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 20000
      idle-timeout: 300000
      keepalive-time: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    ignore-migration-patterns: "*:missing"

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: WARN
    com.fyr.finapp: INFO
    org.hibernate.SQL: WARN
    org.springframework.web: WARN
    org.springframework.security: WARN
